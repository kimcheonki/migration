server: wildfly
version: "22"
directives:
  - name: datasource
    pattern: datasource.*jndi-name
    action: keep
    description: 데이터소스 설정 유지
  - name: thread-pool
    pattern: max-pool-size
    action: keep
    description: 스레드 풀 설정 유지
  - name: ssl
    pattern: ssl.*enabled
    action: keep
    description: SSL 설정 유지
